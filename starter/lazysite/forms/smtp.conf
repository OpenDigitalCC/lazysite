# SMTP configuration for lazysite-form-smtp.pl
# method: sendmail | localhost | remote
method: sendmail
sendmail_path: /usr/sbin/sendmail

# Uncomment for localhost SMTP:
# method: localhost
# host: localhost
# port: 25

# Uncomment for remote SMTP:
# method: remote
# host: mail.example.com
# port: 587
# tls: starttls
# auth: true
# username: webforms@example.com
# password_file: lazysite/forms/.smtp-password

from: webforms@example.com
to: hello@example.com
subject_prefix: "[Contact] "
